name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate image derivatives
        run: |
          mkdir -p docs/images/thumb docs/images/medium
          for f in docs/images/*.jpg; do
            base=$(basename "$f")
            # Thumb: longest edge 600px, strip EXIF, quality 82
            convert "$f" -auto-orient -thumbnail 600x600 -strip -quality 82 "docs/images/thumb/$base"
            # Medium: longest edge 1600px, strip EXIF, quality 88
            convert "$f" -auto-orient -thumbnail 1600x1600 -strip -quality 88 "docs/images/medium/$base"
            echo "processed: $base"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
